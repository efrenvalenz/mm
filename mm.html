<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --orange: #ff6b2b;
    --dark: #0a0a0a;
    --mid: #111111;
    --stripe-dark: #0f0f0f;
    --stripe-light: #1a1a1a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: #fff;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  /* Animated hazard stripe background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      #f5c84208 0px, #f5c84208 30px,
      transparent 30px, transparent 60px
    );
    animation: stripeScroll 3s linear infinite;
    z-index: 0;
  }

  @keyframes stripeScroll {
    from { background-position: 0 0; }
    to { background-position: 84px 0; }
  }

  /* Particle canvas */
  #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    z-index: 99;
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 10;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Top caution tape */
  .tape {
    position: fixed;
    left: 0; right: 0;
    height: 44px;
    display: flex;
    overflow: hidden;
    z-index: 20;
  }
  .tape.top { top: 0; }
  .tape.bottom { bottom: 0; }

  .tape-inner {
    display: flex;
    white-space: nowrap;
    animation: tapeScroll 6s linear infinite;
    height: 100%;
  }
  .tape.bottom .tape-inner { animation-direction: reverse; }

  @keyframes tapeScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .tape-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 100%;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }
  .tape-segment:nth-child(odd) {
    background: var(--gold);
    color: var(--dark);
  }
  .tape-segment:nth-child(even) {
    background: var(--dark);
    color: var(--gold);
  }

  /* Gear icons */
  .gears {
    position: relative;
    width: 160px;
    height: 100px;
    margin-bottom: -10px;
  }

  .gear {
    position: absolute;
    border-radius: 50%;
    border: 6px solid var(--gold);
  }

  .gear::before, .gear::after {
    content: '';
    position: absolute;
    background: var(--gold);
    border-radius: 2px;
    top: 50%; left: 50%;
    transform-origin: 0 0;
  }

  .gear-big {
    width: 72px; height: 72px;
    top: 14px; left: 0;
    animation: spinGear 4s linear infinite;
  }
  .gear-small {
    width: 44px; height: 44px;
    top: 28px; left: 64px;
    animation: spinGear 4s linear infinite reverse;
  }

  @keyframes spinGear { to { transform: rotate(360deg); } }

  /* SVG gears */
  .gear-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 2rem;
  }

  .gear-svg {
    fill: none;
    stroke: var(--gold);
    stroke-width: 2;
  }
  .gear-svg.big { animation: spinGear 5s linear infinite; }
  .gear-svg.small { animation: spinGear 5s linear infinite reverse; }
  .gear-svg.mid { animation: spinGear 8s linear infinite; }

  /* MAIN HEADING */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 14vw, 10rem);
    line-height: 0.9;
    text-align: center;
    color: #fff;
    letter-spacing: 0.02em;
    position: relative;
  }

  .headline span {
    display: block;
  }

  .headline .under {
    color: var(--gold);
    text-shadow:
      0 0 30px rgba(245, 200, 66, 0.6),
      0 0 60px rgba(245, 200, 66, 0.3);
    animation: glowPulse 2s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 30px rgba(245,200,66,0.6), 0 0 60px rgba(245,200,66,0.3); }
    50% { text-shadow: 0 0 50px rgba(245,200,66,0.9), 0 0 100px rgba(245,200,66,0.5), 0 0 140px rgba(255,107,43,0.3); }
  }

  .headline .construction {
    color: #fff;
    -webkit-text-stroke: 2px var(--gold);
  }

  /* Glitch effect */
  .glitch {
    position: relative;
  }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    font-family: 'Bebas Neue', sans-serif;
    font-size: inherit;
    letter-spacing: inherit;
  }
  .glitch::before {
    color: #ff0055;
    clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    animation: glitch1 4s infinite;
    -webkit-text-stroke: 0;
  }
  .glitch::after {
    color: #00ffff;
    clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%);
    animation: glitch2 4s infinite;
    -webkit-text-stroke: 0;
  }

  @keyframes glitch1 {
    0%, 85%, 100% { transform: translateX(0); opacity: 0; }
    86% { transform: translateX(-4px); opacity: 0.8; }
    88% { transform: translateX(4px); opacity: 0.8; }
    90% { transform: translateX(-2px); opacity: 0; }
  }
  @keyframes glitch2 {
    0%, 85%, 100% { transform: translateX(0); opacity: 0; }
    87% { transform: translateX(4px); opacity: 0.8; }
    89% { transform: translateX(-4px); opacity: 0.8; }
    91% { transform: translateX(2px); opacity: 0; }
  }

  /* Subtext */
  .subtext {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 1.2rem;
    text-align: center;
  }

  /* Progress bar */
  .progress-wrap {
    margin-top: 2.5rem;
    width: clamp(280px, 50vw, 520px);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  .progress-pct {
    color: var(--gold);
    font-weight: 700;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--orange));
    border-radius: 99px;
    width: 0%;
    animation: fillBar 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards 0.5s;
    position: relative;
  }

  @keyframes fillBar {
    to { width: 73%; }
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 20px; height: 100%;
    background: rgba(255,255,255,0.5);
    animation: shimmer 1.5s ease-in-out infinite 3.5s;
    filter: blur(4px);
  }

  @keyframes shimmer {
    0% { opacity: 0; transform: translateX(0); }
    50% { opacity: 1; }
    100% { opacity: 0; transform: translateX(10px); }
  }

  /* Status row */
  .status-row {
    display: flex;
    gap: 1.5rem;
    margin-top: 2rem;
  }

  .status-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 99px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: dotBlink 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .dot.orange { background: var(--orange); animation-delay: 0.5s; }
  .dot.red { background: #ff3355; animation-delay: 1s; }

  @keyframes dotBlink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  /* Corner brackets */
  .corner { position: fixed; width: 40px; height: 40px; z-index: 15; }
  .corner.tl { top: 54px; left: 12px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner.tr { top: 54px; right: 12px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .corner.bl { bottom: 54px; left: 12px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner.br { bottom: 54px; right: 12px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  /* Typed cursor effect */
  .typed-line {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    margin-top: 0.6rem;
    min-height: 1.2em;
  }
  .cursor {
    display: inline-block;
    width: 7px; height: 0.9em;
    background: var(--gold);
    animation: cursorBlink 0.9s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

</style>
</head>
<body>

<!-- Caution tapes -->
<div class="tape top">
  <div class="tape-inner" id="tapeTop"></div>
</div>
<div class="tape bottom">
  <div class="tape-inner" id="tapeBottom"></div>
</div>

<!-- Corner brackets -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Particle canvas -->
<canvas id="particles"></canvas>

<div class="scene">

  <!-- SVG Gears -->
  <div class="gear-wrap">
    <svg class="gear-svg big" width="52" height="52" viewBox="0 0 52 52">
      <path d="M26,10 a16,16 0 1,1 -0.1,0 Z M20,2 h12 l1,8 a18,18 0 0,1 6,3.5 l7.5-3 6,10.4-6,5.5a18,18 0 0,1 0,7l6,5.5-6,10.4-7.5-3a18,18 0 0,1-6,3.5l-1,8h-12l-1-8a18,18 0 0,1-6-3.5l-7.5,3-6-10.4,6-5.5a18,18 0 0,1,0-7l-6-5.5,6-10.4,7.5,3a18,18 0 0,1,6-3.5Z" stroke-linejoin="round"/>
      <circle cx="26" cy="26" r="8"/>
    </svg>
    <svg class="gear-svg small" width="34" height="34" viewBox="0 0 34 34">
      <path d="M17,7 a10,10 0 1,1 -0.1,0 Z M13,1 h8 l0.8,5a12,12 0 0,1,4,2.3l4.8-2,4,6.9-3.8,3.5a12,12 0 0,1,0,4.6l3.8,3.5-4,6.9-4.8-2a12,12 0 0,1-4,2.3l-0.8,5h-8l-0.8-5a12,12 0 0,1-4-2.3l-4.8,2-4-6.9,3.8-3.5a12,12 0 0,1,0-4.6l-3.8-3.5,4-6.9,4.8,2a12,12 0 0,1,4-2.3Z" stroke-linejoin="round"/>
      <circle cx="17" cy="17" r="5"/>
    </svg>
    <svg class="gear-svg mid" width="42" height="42" viewBox="0 0 42 42">
      <path d="M21,8 a13,13 0 1,1 -0.1,0 Z M16,1.5 h10 l0.9,6a15,15 0 0,1,5,3l5.5-2.3,5,8.7-4.5,4.1a15,15 0 0,1,0,5.8l4.5,4.1-5,8.7-5.5-2.3a15,15 0 0,1-5,3l-0.9,6h-10l-0.9-6a15,15 0 0,1-5-3l-5.5,2.3-5-8.7,4.5-4.1a15,15 0 0,1,0-5.8l-4.5-4.1,5-8.7,5.5,2.3a15,15 0 0,1,5-3Z" stroke-linejoin="round"/>
      <circle cx="21" cy="21" r="6"/>
    </svg>
  </div>

  <!-- Main headline -->
  <h1 class="headline">
    <span class="under">Under</span>
    <span class="construction glitch" data-text="Construction">Construction</span>
  </h1>

  <p class="subtext">Something extraordinary is being built</p>
  <div class="typed-line" id="typedLine"><span class="cursor"></span></div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Build Progress</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Status chips -->
  <div class="status-row">
    <div class="status-chip"><span class="dot"></span>Systems Online</div>
    <div class="status-chip"><span class="dot orange"></span>Building</div>
    <div class="status-chip"><span class="dot red"></span>ETA: Soon™</div>
  </div>

</div>

<script>
// Tape segments
function buildTape(id) {
  const el = document.getElementById(id);
  const words = ['CAUTION','UNDER CONSTRUCTION','DO NOT ENTER','WORK IN PROGRESS'];
  let html = '';
  for (let i = 0; i < 20; i++) {
    html += `<div class="tape-segment">${words[i % words.length]}</div>`;
  }
  el.innerHTML = html + html; // doubled for seamless loop
}
buildTape('tapeTop');
buildTape('tapeBottom');

// Progress counter
const fill = document.getElementById('progressFill');
const pct = document.getElementById('pct');
let p = 0;
const target = 73;
setTimeout(() => {
  const iv = setInterval(() => {
    p += 1;
    pct.textContent = p + '%';
    if (p >= target) clearInterval(iv);
  }, (3000 / target));
}, 500);

// Typing effect
const lines = [
  '> initializing core modules...',
  '> compiling assets [████████░░] 82%',
  '> deploying to production...',
  '> almost there, hang tight.',
  '> reticulating splines...',
  '> optimizing pixel perfection...',
];
let li = 0, ci = 0;
const typedEl = document.getElementById('typedLine');
const cursor = '<span class="cursor"></span>';

function typeNext() {
  if (ci <= lines[li].length) {
    typedEl.innerHTML = lines[li].slice(0, ci) + cursor;
    ci++;
    setTimeout(typeNext, 45 + Math.random() * 30);
  } else {
    setTimeout(() => {
      ci = 0;
      li = (li + 1) % lines.length;
      typeNext();
    }, 1800);
  }
}
typeNext();

// Particle system
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = -Math.random() * 0.8 - 0.2;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.gold = Math.random() > 0.6;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.alpha -= 0.003;
    if (this.alpha <= 0 || this.y < -10) this.reset();
  }
  draw() {
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.gold ? '#f5c842' : '#ff6b2b';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
